<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="FApsm8BJvIrnQnKVJdx8dNKNKonopQLexLOc6LgU9pM" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSS INNOVATIONS (PTY) LTD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        :root { --primary-color: #0f172a; --brand-red: #ce1212; --text-dark: #334155; --bg-light: #f8fafc; --white: #ffffff; }
        body { background-color: var(--bg-light); color: var(--text-dark); line-height: 1.6; }

        .top-bar { background-color: var(--white); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--brand-red); }
        .logo-area { font-size: 1.6rem; font-weight: 900; color: var(--primary-color); display: flex; align-items: center; }
        .logo-area span { color: var(--brand-red); }
        .sub-tag { font-size: 0.75rem; display: block; text-transform: uppercase; font-weight: bold; color: #64748b; margin-top: 2px; }

        nav { background-color: var(--primary-color); position: sticky; top: 0; z-index: 100; width: 100%; display: flex; flex-direction: column; }
        .menu-checkbox { display: none; }
        .menu-icon { display: none; cursor: pointer; }

        nav ul { display: flex; list-style: none; max-width: 1200px; margin: 0 auto; width: 100%; }
        nav ul li { position: relative; }
        nav ul li a { display: block; padding: 1.2rem 1.5rem; color: #f1f5f9; text-decoration: none; font-weight: 600; font-size: 0.95rem; }
        nav ul li:hover > a { background-color: var(--brand-red); color: var(--white); }

        .dropdown { display: none; position: absolute; top: 100%; left: 0; background-color: var(--white); min-width: 260px; z-index: 200; }
        .dropdown li a { color: var(--primary-color); padding: 0.9rem 1.2rem; border-bottom: 1px solid #e2e8f0; }
        nav ul li:hover .dropdown { display: block; }

        header { background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.95)), url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?auto=format&fit=crop&w=1200&q=80') center/cover; color: var(--white); height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 4rem 1.5rem; }
        .vision-box { background: var(--white); padding: 3rem 2rem; border-radius: 8px; border-left: 6px solid var(--brand-red); margin-bottom: 4rem; }
        .idea-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .idea-pillar { background: var(--bg-light); padding: 1.5rem; }
        .sector-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .sector-card { background: var(--white); display: block; text-decoration: none; color: inherit; }

        footer { background-color: #0b0f19; color: #94a3b8; padding: 4rem 2rem; text-align: center; }

        @media (max-width: 768px) {
            .top-bar { flex-direction: column; text-align: center; }
            .menu-icon { display: flex; flex-direction: column; width: 30px; height: 20px; position: absolute; top: 15px; right: 20px; z-index: 150; }
            .menu-icon span { display: block; height: 3px; width: 100%; background-color: #ffffff !important; margin-bottom: 5px; }
            
            /* FORCE CONTENT PUSH DOWN */
            nav ul { display: none; flex-direction: column; position: static; width: 100%; background-color: #111827; }
            .menu-checkbox:checked ~ ul { display: flex !important; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div>
            <div class="logo-area">
                <img src="logo.png" alt="JSS Innovations Logo" style="height: 60px; margin-right: 15px;"> 
                JSS <span>INNOVATIONS</span>
            </div>
            <span class="sub-tag">Process Systems & Infrastructure Engineering</span>
        </div>
        <div style="text-align: right; font-weight: 600;">🏢 CIPC COMPLIANT | 📈 B-BBEE Level 1</div>
    </div>

    <nav>
        <input type="checkbox" id="menu-toggle" class="menu-checkbox">
        <label for="menu-toggle" class="menu-icon"><span></span><span></span><span></span></label>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Our Business ▾</a>
                <ul class="dropdown">
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="team.html">Our Team (Board)</a></li>
                </ul>
            </li>
            <li><a href="terms.html">Terms & Conditions</a></li>
        </ul>
    </nav>
    <!-- Rest of your content -->
</body>
</html>
